name: CI/CD

on:
  pull_request:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: java configuration
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: compile project
        run: mvn compile

      - name: run unit tests
        run: mvn -B test

      - name: run integration tests
        run: mvn failsafe:integration-test failsafe:verify

      - name: build jar
        run: mvn package -DskipTests

      # mandar o .jar para o github, para download

      - name: build docker image
        run: mvn jib:dockerBuild

      # publicar o image file no docker hub